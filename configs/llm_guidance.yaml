environment:
  name: simple_spread_v3
  num_agents: 3
  num_landmarks: 3
  max_cycles: 25
  continuous_actions: true
  local_ratio: 0.5
  render_mode: null

algorithm:
  name: llm_guided_ippo
  hidden_sizes: [64, 64]
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 0.5
  update_epochs: 4
  minibatch_size: 256
  log_std_init: -0.5

llm_guidance:
  enabled: true
  provider: qwen
  api_key_env: LLM_API_KEY
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  model: qwen-plus
  call_frequency_episodes: 100
  reward_shaping_coef: 0.05

training:
  seed: 0
  total_episodes: 500
  episodes_per_update: 4
  log_interval: 4
  device: auto

logging:
  log_path: logs/llm_guidance_seed_{seed}.csv
  checkpoint_path: checkpoints/llm_guidance_seed_{seed}_best.pt
